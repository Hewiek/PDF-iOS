<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <style>
    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: auto;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'Apple Color Emoji',
        'Segoe UI Emoji';
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #ffffff;
      user-select: none;
    }

    #root {
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      overflow: visible;
      min-height: 100dvh;
    }

    @media (min-width: 768px) {
      body.is-standalone #root {
        max-width: 430px;
      }
    }

    button,
    a {
      touch-action: manipulation;
    }

    input,
    textarea {
      user-select: text;
    }

    /* 如果是元素演示页面（可能被内嵌到 iframe），设置固定尺寸 */
    body.is-element-page #root {
      width: 100vw;
      height: 100vh;
    }

    /* 平板和手机模式隐藏滚动条 */
    @media (max-width: 1024px) {
      ::-webkit-scrollbar {
        display: none;
      }

      html,
      body {
        scrollbar-width: none;
        /* Firefox */
      }
    }
  </style>
</head>

<body>

  <script>
    // 判断是否为元素演示页面（在 body 加载后执行）
    (function () {
      function applyBodyFlags() {
        const standalone = window.top === window.self;
        document.body.classList.add(standalone ? 'is-standalone' : 'is-embedded');
        if (window.location.pathname.includes('/elements/')) {
          document.body.classList.add('is-element-page');
        }
      }

      if (document.body) {
        applyBodyFlags();
      } else {
        document.addEventListener('DOMContentLoaded', applyBodyFlags);
      }
    })();
  </script>

  <div id="root"></div>

  <!-- 加载 bootstrap JS（会自动挂载到 window.HtmlTemplateBootstrap） -->
  <script type="module" src="{{BOOTSTRAP_PATH}}"></script>

  <!-- 加载组件 JS（IIFE 格式，会挂载 UserComponent 到 window） -->
  <script src="{{ENTRY}}"></script>

  <script type="module">
    // 等待 bootstrap 和组件加载完成
    function waitForReady() {
      if (window.HtmlTemplateBootstrap && window.UserComponent) {
        const { renderComponent, React, ReactDOM } = window.HtmlTemplateBootstrap;

        // 将 React 和 ReactDOM 挂载到全局
        window.React = React;
        window.ReactDOM = ReactDOM;

        // 获取组件
        const Component = window.UserComponent.Component || window.UserComponent.default || window.UserComponent;

        // 渲染组件
        renderComponent(Component);
      } else {
        setTimeout(waitForReady, 10);
      }
    }

    waitForReady();
  </script>

</body>

</html>
